name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate checksums
        run: |
          sha256sum Disable-AdobeTelemetry.ps1 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Disable-AdobeTelemetry.ps1
            SHA256SUMS.txt
          generate_release_notes: true
